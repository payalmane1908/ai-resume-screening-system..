{% extends 'base.html' %}
{% block title %}Login | Resume AI{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card glass-card border-0 shadow-lg">
            <div class="card-body p-4">
                <h4 class="mb-3">Secure Login</h4>
                <form method="post" action="{{ url_for('auth.login') }}" class="mb-3">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button class="btn btn-primary w-100">Login</button>
                </form>
                <hr>
                <h6>Create account</h6>
                <form method="post" action="{{ url_for('auth.register') }}">
                    <div class="mb-2">
                        <input type="text" name="username" class="form-control" placeholder="Username" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" name="password" class="form-control" placeholder="Password (min 6 chars)" required>
                    </div>
                    <button class="btn btn-outline-primary w-100">Register</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
